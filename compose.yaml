services:
  postgres:
    image: postgres:18-alpine
    container_name: e2e-challenge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: e2e_challenge
      POSTGRES_PASSWORD: e2e_challenge
      POSTGRES_USER: e2e_challenge
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U e2e_challenge -d e2e_challenge"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "55432:5432"
    volumes:
      - postgres-18-data:/var/lib/postgresql

volumes:
  postgres-18-data:
